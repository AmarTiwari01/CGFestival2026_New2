<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Share Your Thoughts</title>
<link rel="stylesheet" href="contact.css">
</head>

<body>
    <button class="toggle" onclick="toggleMode()">🌙 Mode</button>


<div class="container">

  
<div class="header" style="
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px 10px;
  min-height: 5px;
  gap: 10px;
  margin-top: 3vh;
  ">
    <img src="emblem.png" class="logo-left">

    <div class="title">
      <strong>CHHATTISGARH FESTIVAL CALENDAR - 2026</strong>
    </div>

    <div class="logo-right">
      <img src="cm.png">
      <img src="governor.png">
    </div>
  </div>


<div class="container_contact">
    <h2 class="heading">Share Your Thoughts</h2>

    <form id="contactForm">
        <div class="form-group">
            <label>Name</label>
            <input type="text" id="name">
            <div class="error" id="nameError"></div>
        </div>

        <div class="form-group">
            <label>Email</label>
            <input type="email" id="email">
            <div class="error" id="emailError"></div>
        </div>

        <div class="form-group">
            <label>Message</label>
            <textarea id="message"></textarea>
            <div class="error" id="messageError"></div>
        </div>

        <button type="submit" class="submitbutton">Send Message</button><br><br>
        <div class="success" id="successMsg"></div>
    </form>
</div>

<CENTER><a style=" text-decoration: none; padding: 15px; color: white" href="index.html"><strong>Back to Home</strong></a></CENTER>
<script>
    const form = document.getElementById("contactForm");

    form.addEventListener("submit", function(e) {
        e.preventDefault();

        // Get values
        let name = document.getElementById("name").value.trim();
        let email = document.getElementById("email").value.trim();
        let message = document.getElementById("message").value.trim();

        // Error fields
        let nameError = document.getElementById("nameError");
        let emailError = document.getElementById("emailError");
        let messageError = document.getElementById("messageError");
        let successMsg = document.getElementById("successMsg");

        // Reset errors
        nameError.textContent = "";
        emailError.textContent = "";
        messageError.textContent = "";
        successMsg.textContent = "";

        let isValid = true;

        // Validation
        if (name === "") {
            nameError.textContent = "Name is required";
            isValid = false;
        }

        if (email === "") {
            emailError.textContent = "Email is required";
            isValid = false;
        } else if (!email.includes("@")) {
            emailError.textContent = "Enter valid email";
            isValid = false;
        }

        if (message === "") {
            messageError.textContent = "Message is required";
            isValid = false;
        }

        // Success
        if (isValid) {
            successMsg.textContent = "Message sent successfully!";
            form.reset();
        }
    });

function toggleMode(){
  document.body.classList.toggle("dark1");
}

</script>

</body>
</html>
